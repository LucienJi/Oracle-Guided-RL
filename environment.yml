name: opi
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch
  - torchvision
  - pytorch-cuda=12.4
  # MuJoCo: install via pip (see base.txt) so bindings match dm_control's expected MjModel layout (e.g. cam_orthographic)
  - glfw
  - glew
  - ffmpeg
  - pip:
      - -r requirements/base.txt
